<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Invite with Media Events</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 5px;
            margin-bottom: 30px;
        }
        
        main {
            max-width: 900px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        section {
            margin-bottom: 40px;
        }
        
        section h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
        }
        
        .video-container {
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        
        video {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .video-status {
            margin-top: 15px;
            padding: 15px;
            background-color: #e8f4f8;
            border-left: 4px solid #3498db;
            border-radius: 4px;
            display: none;
        }
        
        .video-status.show {
            display: block;
        }
        
        .video-status.ready {
            background-color: #d4edda;
            border-left-color: #28a745;
            color: #155724;
        }
        
        .form-section {
            background-color: #f9f9f9;
            padding: 25px;
            border-radius: 8px;
            border: 2px solid #ecf0f1;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: bold;
        }
        
        input[type="email"],
        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #bdc3c7;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 1em;
        }
        
        input[type="email"]:focus,
        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        button {
            background-color: #3498db;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s ease;
        }
        
        button:hover {
            background-color: #2980b9;
        }
        
        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert.warning {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
            display: block;
        }
        
        .info-text {
            color: #666;
            font-size: 0.95em;
            margin-top: 10px;
        }
        
        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 30px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Event Promo Video & Registration</h1>
    </header>

    <main>
        <section>
            <h2>Event Highlight Video</h2>
            <div class="video-container">
                <video id="promoVideo" controls width="800">
                    <source src="data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pc2FjAAACAIucGFkZQAAABZtZGF0AAACTgYF//" title="Community Event Promo">
                        Your browser does not support the video tag.
                    </video>
            </div>
            <div class="video-status" id="videoStatus"></div>
            <div class="info-text">This video showcases highlights from our recent community events. It may take a moment to load.</div>
        </section>

        <section>
            <h2>Register for the Event</h2>
            <div class="alert warning" id="formAlert"></div>
            
            <form id="registrationForm" class="form-section">
                <div class="form-group">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="comments">Additional Comments:</label>
                    <textarea id="comments" name="comments" placeholder="Tell us why you're interested in this event..."></textarea>
                </div>

                <button type="submit">Register Now</button>
                <input type="hidden" id="videoWatched" value="false">
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Local Community Event Portal. All rights reserved.</p>
    </footer>

    <script>
        const video = document.getElementById('promoVideo');
        const videoStatus = document.getElementById('videoStatus');
        const registrationForm = document.getElementById('registrationForm');
        const formAlert = document.getElementById('formAlert');
        const videoWatchedInput = document.getElementById('videoWatched');

        video.addEventListener('canplay', function() {
            videoStatus.textContent = '✓ Video ready to play!';
            videoStatus.classList.add('show', 'ready');
        });

        video.addEventListener('play', function() {
            videoWatchedInput.value = 'true';
        });

        window.addEventListener('beforeunload', function(e) {
            const formValues = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                comments: document.getElementById('comments').value
            };

            const hasValues = Object.values(formValues).some(val => val.trim() !== '');

            if (hasValues) {
                e.preventDefault();
                e.returnValue = '';
                return '';
            }
        });

        registrationForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            
            formAlert.textContent = `✓ Thank you, ${name}! Your registration has been received. A confirmation email will be sent to ${email}.`;
            formAlert.classList.remove('warning');
            formAlert.classList.add('alert');
            formAlert.style.backgroundColor = '#d4edda';
            formAlert.style.color = '#155724';
            formAlert.style.borderColor = '#c3e6cb';
            
            this.reset();
            
            setTimeout(() => {
                formAlert.style.display = 'none';
            }, 5000);
        });

        video.addEventListener('error', function() {
            videoStatus.textContent = 'Note: Video file not available in this demo. Please use your own video file.';
            videoStatus.classList.add('show');
        });
    </script>
</body>
</html>
