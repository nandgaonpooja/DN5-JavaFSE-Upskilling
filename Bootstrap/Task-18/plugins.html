<!DOCTYPE html>
<html lang="en">
<head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="container mt-4">
    <button class="btn btn-primary mb-4" data-bs-toggle="modal" data-bs-target="#myModal">Launch Modal</button>
    
    <div class="modal fade" id="myModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Modal</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">Modal Content</div>
    </div></div></div>

    <div class="accordion" id="acc">
        <div class="accordion-item">
            <h2 class="accordion-header"><button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#col1">Accordion 1</button></h2>
            <div id="col1" class="accordion-collapse collapse show" data-bs-parent="#acc"><div class="accordion-body">Details here</div></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
