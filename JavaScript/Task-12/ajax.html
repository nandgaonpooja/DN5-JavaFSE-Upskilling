<!DOCTYPE html>
<html lang="en">
<head><title>Task 12: AJAX</title></head>
<body>
    <h2>Task 12: AJAX POST</h2>
    <button onclick="submitData()">Simulate Backend Registration</button>
    <p id="msg"></p>
    <script>
        function submitData() {
            document.getElementById('msg').innerText = "Sending...";
            
            // Simulate delay
            setTimeout(() => {
                fetch('https://jsonplaceholder.typicode.com/posts', {
                    method: 'POST',
                    body: JSON.stringify({ name: 'Sahil', event: 'Tech Meetup' }),
                    headers: { 'Content-type': 'application/json; charset=UTF-8' },
                })
                .then(response => response.json())
                .then(json => {
                    document.getElementById('msg').innerText = "Registration Success ID: " + json.id;
                })
                .catch(err => {
                    document.getElementById('msg').innerText = "Registration Failed!";
                });
            }, 1000);
        }
    </script>
</body>
</html>
